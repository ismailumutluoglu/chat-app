version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: chatapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatapp_secret}
      POSTGRES_DB: ${POSTGRES_DB:-chatapp_db}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - chatapp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: chatapp_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-chatapp}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-chatapp_secret}
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    networks:
      - chatapp_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chatapp_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-chatapp_secret}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - chatapp_network
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--no-auth-warning",
          "-a",
          "${REDIS_PASSWORD:-chatapp_secret}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  mongodata:
  redisdata:

networks:
  chatapp_network:
    driver: bridge
